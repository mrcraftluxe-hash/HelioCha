<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HelioChat - Чат</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <!-- шапка чата -->
        <div class="chat-header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="chat-user">
                <div class="chat-avatar" id="chatUserAvatar">😊</div>
                <div>
                    <div class="chat-name" id="chatUserName">Загрузка...</div>
                    <div class="chat-status" id="chatUserStatus">
                        <span id="statusText">онлайн</span>
                        <span id="aiTyping" style="display:none; color:#2b5278;">печатает...</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- сообщения -->
        <div class="messages-container" id="messagesContainer"></div>
        
        <!-- ввод -->
        <div class="message-input-area">
            <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="checkEnter(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script src="chat.js"></script>
    <script src="ai.js"></script>
</body>
</html>
